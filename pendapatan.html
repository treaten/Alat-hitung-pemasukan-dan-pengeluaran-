<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penghitung Warung - Pemasukan & Pengeluaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            background-color: #f8fafc;
            -webkit-user-select: none;
            user-select: none;
        }
        .btn-active:active {
            transform: scale(0.96);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center items-start min-h-screen">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
        
        <!-- Dashboard Saldo -->
        <div class="bg-slate-900 p-8 text-white">
            <div class="text-center mb-8">
                <h1 class="text-[10px] font-black opacity-40 uppercase tracking-[0.3em] mb-1">Saldo Bersih Tersimpan</h1>
                <p id="totalSaldo" class="text-5xl font-black tracking-tighter">Rp 0</p>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-emerald-500/10 backdrop-blur-sm rounded-2xl p-4 border border-emerald-500/20">
                    <p class="text-[9px] uppercase font-black text-emerald-400 mb-1">📈 Pemasukan</p>
                    <p id="totalMasuk" class="text-lg font-bold">Rp 0</p>
                </div>
                <div class="bg-rose-500/10 backdrop-blur-sm rounded-2xl p-4 border border-rose-500/20">
                    <p class="text-[9px] uppercase font-black text-rose-400 mb-1">📉 Pengeluaran</p>
                    <p id="totalKeluar" class="text-lg font-bold">Rp 0</p>
                </div>
            </div>
        </div>

        <!-- Panel Input -->
        <div class="p-8">
            <div class="mb-6 relative">
                <span class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 font-bold text-xl">Rp</span>
                <input type="number" id="inputNominal" 
                    class="w-full text-4xl font-black pl-16 pr-6 py-6 bg-slate-50 border-2 border-slate-100 rounded-3xl focus:border-blue-500 focus:outline-none transition-all text-slate-800 placeholder:text-slate-200"
                    placeholder="0"
                    inputmode="numeric">
            </div>
            
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button id="btnTunai" onclick="setMode('Tunai')" class="py-3 rounded-xl text-[10px] font-black transition-all border-2 border-slate-900 bg-slate-900 text-white btn-active">
                    💵 TUNAI
                </button>
                <button id="btnQRIS" onclick="setMode('QRIS')" class="py-3 rounded-xl text-[10px] font-black transition-all border-2 border-slate-100 bg-white text-slate-400 btn-active">
                    📱 QRIS
                </button>
                <button id="btnKeluar" onclick="setMode('Keluar')" class="py-3 rounded-xl text-[10px] font-black transition-all border-2 border-slate-100 bg-white text-slate-400 btn-active">
                    💸 KELUAR
                </button>
            </div>

            <div class="space-y-3">
                <button id="mainBtn" onclick="simpanData()" class="btn-active w-full bg-blue-600 text-white font-black py-5 rounded-2xl text-xl shadow-lg shadow-blue-200 transition-all">
                    SIMPAN DATA
                </button>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="bagikanLaporan()" class="btn-active flex items-center justify-center gap-2 bg-slate-900 text-white font-bold py-4 rounded-2xl">
                        Laporan
                    </button>
                    <button onclick="hapusTerakhir()" class="btn-active flex items-center justify-center gap-2 bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl">
                        Batal 1
                    </button>
                </div>
            </div>
        </div>

        <!-- Riwayat -->
        <div class="bg-slate-50 border-t border-slate-100">
            <div class="px-8 py-5 flex justify-between items-center">
                <h3 class="font-black text-slate-400 uppercase text-[10px] tracking-[0.2em]">Riwayat Transaksi</h3>
                <button onclick="resetSemua()" class="text-[10px] text-rose-500 font-bold uppercase hover:underline">Hapus Semua</button>
            </div>
            <div id="listRiwayat" class="max-h-72 overflow-y-auto pb-8 custom-scrollbar">
                <!-- Data muncul di sini -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-full text-sm font-black shadow-2xl opacity-0 transition-all transform translate-y-4 pointer-events-none z-50">
        DISIMPAN!
    </div>

    <script>
        let transaksi = JSON.parse(localStorage.getItem('warung_data_v2')) || [];
        let modeAktif = 'Tunai';

        function setMode(mode) {
            modeAktif = mode;
            const btnT = document.getElementById('btnTunai');
            const btnQ = document.getElementById('btnQRIS');
            const btnK = document.getElementById('btnKeluar');
            const mainB = document.getElementById('mainBtn');

            [btnT, btnQ, btnK].forEach(b => {
                b.className = "py-3 rounded-xl text-[10px] font-black transition-all border-2 border-slate-100 bg-white text-slate-400 btn-active";
            });

            if (mode === 'Tunai') {
                btnT.className = "py-3 rounded-xl text-[10px] font-black transition-all border-2 border-slate-900 bg-slate-900 text-white btn-active";
                mainB.className = "btn-active w-full bg-blue-600 text-white font-black py-5 rounded-2xl text-xl shadow-lg shadow-blue-200 transition-all";
            } else if (mode === 'QRIS') {
                btnQ.className = "py-3 rounded-xl text-[10px] font-black transition-all border-2 border-cyan-500 bg-cyan-500 text-white btn-active";
                mainB.className = "btn-active w-full bg-cyan-600 text-white font-black py-5 rounded-2xl text-xl shadow-lg shadow-cyan-200 transition-all";
            } else {
                btnK.className = "py-3 rounded-xl text-[10px] font-black transition-all border-2 border-rose-500 bg-rose-500 text-white btn-active";
                mainB.className = "btn-active w-full bg-rose-600 text-white font-black py-5 rounded-2xl text-xl shadow-lg shadow-rose-200 transition-all";
            }
        }

        function formatRupiah(n) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(n).replace("Rp", "Rp ");
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-4');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.add('opacity-0', 'translate-y-4');
                t.classList.remove('opacity-100', 'translate-y-0');
            }, 2000);
        }

        function updateUI() {
            localStorage.setItem('warung_data_v2', JSON.stringify(transaksi));
            
            const masuk = transaksi.filter(t => t.tipe !== 'Keluar').reduce((a, b) => a + b.nominal, 0);
            const keluar = transaksi.filter(t => t.tipe === 'Keluar').reduce((a, b) => a + b.nominal, 0);
            const saldo = masuk - keluar;

            document.getElementById('totalSaldo').innerText = formatRupiah(saldo);
            document.getElementById('totalMasuk').innerText = formatRupiah(masuk);
            document.getElementById('totalKeluar').innerText = formatRupiah(keluar);

            const container = document.getElementById('listRiwayat');
            if (transaksi.length === 0) {
                container.innerHTML = '<div class="py-12 text-center text-slate-300 text-xs italic">Belum ada transaksi...</div>';
                return;
            }

            container.innerHTML = '';
            [...transaksi].reverse().forEach((item, index) => {
                const isKeluar = item.tipe === 'Keluar';
                const div = document.createElement('div');
                div.className = 'px-8 py-4 flex justify-between items-center border-b border-slate-100 bg-white last:border-0';
                
                let colorClass = "bg-amber-100 text-amber-600";
                if(item.tipe === 'QRIS') colorClass = "bg-cyan-100 text-cyan-600";
                if(isKeluar) colorClass = "bg-rose-100 text-rose-600";

                div.innerHTML = `
                    <div class="flex flex-col">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[8px] font-black px-2 py-0.5 rounded ${colorClass}">${item.tipe.toUpperCase()}</span>
                            <span class="text-[10px] font-bold text-slate-400">${item.waktu}</span>
                        </div>
                        <span class="font-black text-xl ${isKeluar ? 'text-rose-600' : 'text-slate-800'}">
                            ${isKeluar ? '-' : ''}${formatRupiah(item.nominal)}
                        </span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function simpanData() {
            const el = document.getElementById('inputNominal');
            const val = parseInt(el.value);
            if (!val || val <= 0) return;

            const d = new Date();
            const waktu = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;

            transaksi.push({ nominal: val, tipe: modeAktif, waktu: waktu });
            el.value = '';
            el.focus();
            updateUI();
            notify("BERHASIL DISIMPAN!");
        }

        function hapusTerakhir() {
            if (transaksi.length > 0 && confirm("Hapus transaksi terakhir?")) {
                transaksi.pop();
                updateUI();
            }
        }

        function resetSemua() {
            if (transaksi.length > 0 && confirm("Hapus semua data secara permanen?")) {
                transaksi = [];
                updateUI();
            }
        }

        function bagikanLaporan() {
            if (transaksi.length === 0) return;
            const masuk = transaksi.filter(t => t.tipe !== 'Keluar').reduce((a, b) => a + b.nominal, 0);
            const keluar = transaksi.filter(t => t.tipe === 'Keluar').reduce((a, b) => a + b.nominal, 0);
            const saldo = masuk - keluar;
            
            let teks = `*LAPORAN WARUNG*\n━━━━━━━━━━━━━━━━\n`;
            teks += `💰 *SALDO BERSIH: ${formatRupiah(saldo)}*\n\n`;
            teks += `📈 Pemasukan: ${formatRupiah(masuk)}\n`;
            teks += `📉 Pengeluaran: ${formatRupiah(keluar)}\n`;
            teks += `━━━━━━━━━━━━━━━━\n\n`;
            
            transaksi.forEach((t, i) => {
                const prefix = t.tipe === 'Keluar' ? '-' : '';
                teks += `${i+1}. [${t.waktu}] ${t.tipe}: ${prefix}${formatRupiah(t.nominal)}\n`;
            });

            if (navigator.share) {
                navigator.share({ text: teks });
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = teks;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                notify("LAPORAN DISALIN!");
            }
        }

        updateUI();
    </script>
</body>
</html>
